<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 800px;
    overflow: hidden;
    font-family: 'Outfit', sans-serif;
    background: #0a0a0a;
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  .title {
    font-size: 120px;
    font-weight: 300;
    font-style: italic;
    color: #1a1a1a;
    letter-spacing: -2px;
    text-shadow: 0 2px 30px rgba(255,255,255,0.3);
  }

  .tagline {
    margin-top: 20px;
    font-size: 28px;
    font-weight: 400;
    color: #333;
    letter-spacing: 5px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="overlay">
  <div class="title">Outfitted</div>
  <div class="tagline">Your AI-Powered Wardrobe Stylist</div>
</div>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2');
canvas.width = 1200;
canvas.height = 800;
gl.viewport(0, 0, 1200, 800);

const vs = `#version 300 es
in vec2 position;
void main() { gl_Position = vec4(position, 0.0, 1.0); }`;

const fs = `#version 300 es
precision highp float;
uniform vec2 iResolution;
uniform float iTime;
out vec4 fragColor;
#define S(a,b,t) smoothstep(a,b,t)
mat2 Rot(float a){float s=sin(a),c=cos(a);return mat2(c,-s,s,c);}
vec2 hash(vec2 p){p=vec2(dot(p,vec2(2127.1,81.17)),dot(p,vec2(1269.5,283.37)));return fract(sin(p)*43758.5453);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.0-2.0*f);float n=mix(mix(dot(-1.0+2.0*hash(i),f),dot(-1.0+2.0*hash(i+vec2(1,0)),f-vec2(1,0)),u.x),mix(dot(-1.0+2.0*hash(i+vec2(0,1)),f-vec2(0,1)),dot(-1.0+2.0*hash(i+vec2(1,1)),f-vec2(1,1)),u.x),u.y);return 0.5+0.5*n;}
void main(){
  float t=iTime*0.3;
  vec2 uv=gl_FragCoord.xy/iResolution.xy;
  float ratio=iResolution.x/iResolution.y;
  vec2 tuv=uv-0.5;
  float degree=noise(vec2(t*0.1,tuv.x*tuv.y)*1.5);
  tuv.y*=1.0/ratio;
  tuv*=Rot(radians((degree-0.5)*200.0+180.0));
  tuv.y*=ratio;
  float freq=2.0;
  float amp=30.0;
  float wt=t*1.5;
  tuv.x+=sin(tuv.y*freq+wt)/amp;
  tuv.y+=sin(tuv.x*(freq*1.5)+wt)/(amp*0.5);
  vec3 c1=vec3(0.976,0.820,0.820);
  vec3 c2=vec3(0.992,0.910,0.784);
  vec3 c3=vec3(0.867,0.839,0.996);
  float s=0.3;
  mat2 br=Rot(radians(0.0));
  float bx=(tuv*br).x;
  vec3 l1=mix(c3,c2,S(-0.3-s,0.2+s,bx));
  vec3 l2=mix(c2,c1,S(-0.3-s,0.2+s,bx));
  vec3 col=mix(l1,l2,S(0.5+s,-0.3-s,tuv.y));
  // keep it light like the main page
  col *= 0.9;
  col += 0.1;
  // grain - same as React Grainient component
  vec2 grainUv=uv*2.0;
  float grain=fract(sin(dot(grainUv,vec2(12.9898,78.233)))*43758.5453);
  col+=(grain-0.5)*0.12;
  col=(col-0.5)*1.1+0.5;
  float luma=dot(col,vec3(0.2126,0.7152,0.0722));
  col=mix(vec3(luma),col,0.9);
  col=clamp(col,0.0,1.0);
  fragColor=vec4(col,1.0);
}`;

function makeShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, makeShader(gl.VERTEX_SHADER, vs));
gl.attachShader(prog, makeShader(gl.FRAGMENT_SHADER, fs));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
const loc = gl.getAttribLocation(prog, 'position');
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

gl.uniform2f(gl.getUniformLocation(prog, 'iResolution'), 1200, 800);
// render at t=2 for a nice mid-animation frame
gl.uniform1f(gl.getUniformLocation(prog, 'iTime'), 2.0);
gl.drawArrays(gl.TRIANGLES, 0, 3);
</script>
</body>
</html>
